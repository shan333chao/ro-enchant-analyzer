<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RO 附魔分析配置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans SC', sans-serif;
        }
        /* 游戏风格滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }
        ::-webkit-scrollbar-thumb {
            background: #f59e0b;
            border-radius: 4px;
        }
        /* 自定义滑块 */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            height: 8px;
            background: #374151;
            border-radius: 4px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #f59e0b;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
        }
        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #f59e0b;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
            border: none;
        }
        /* 游戏边框效果 */
        .game-border {
            border: 2px solid #f59e0b;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.3), inset 0 0 30px rgba(139, 92, 246, 0.1);
        }
        .game-border-inner {
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        /* 紫色进度条 */
        .progress-purple {
            background: linear-gradient(90deg, #8b5cf6, #a78bfa);
        }
    </style>
</head>
<body class="bg-[#1a1a2e] text-white min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <!-- 标题栏 -->
        <div class="game-border bg-[#1a1a2e] rounded-t-lg p-4 flex items-center justify-between mb-0">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🎮</span>
                <h1 class="text-xl font-bold text-[#f59e0b]">RO 附魔分析配置</h1>
            </div>
            <div class="flex gap-3">
                <button class="px-4 py-2 bg-[#374151] hover:bg-[#4b5563] rounded-lg transition-colors">
                    重置
                </button>
                <button class="px-4 py-2 bg-[#f59e0b] hover:bg-[#d97706] text-black font-bold rounded-lg transition-colors">
                    保存
                </button>
            </div>
        </div>

        <!-- 属性规则配置 -->
        <div class="game-border game-border-inner bg-[#16213e] rounded-b-lg p-5 mb-6">
            <h2 class="text-lg font-bold text-[#f59e0b] mb-4 flex items-center gap-2">
                <span>⚙️</span> 属性规则配置
            </h2>

            <!-- 添加规则表单 -->
            <div class="bg-[#1a1a2e] rounded-lg p-4 mb-4">
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">属性名</label>
                        <select class="w-full bg-[#374151] border border-[#f59e0b]/30 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-[#f59e0b]">
                            <option>力量</option>
                            <option>体质</option>
                            <option>灵巧</option>
                            <option>敏捷</option>
                            <option>智力</option>
                            <option>幸运</option>
                            <option>MaxHp</option>
                            <option>MaxSp</option>
                            <option>物理攻击</option>
                            <option>魔法攻击</option>
                            <option>物理防御</option>
                            <option>魔法防御</option>
                            <option>命中</option>
                            <option>暴击</option>
                            <option>闪避</option>
                            <option>暴击防护</option>
                            <option>MaxHp%</option>
                            <option>MaxSp%</option>
                            <option>爆伤%</option>
                            <option>爆伤减免%</option>
                            <option>治疗加成%</option>
                            <option>受治疗加成%</option>
                            <option>物伤加成%</option>
                            <option>物伤减免%</option>
                            <option>装备攻速%</option>
                            <option>沉默抵抗</option>
                            <option>冰冻抵抗</option>
                            <option>石化抵抗</option>
                            <option>晕眩抵抗</option>
                            <option>灼烧抵抗</option>
                            <option>中毒抵抗</option>
                            <option>定身抵抗</option>
                            <option>恐惧抵抗</option>
                            <option>诅咒抵抗</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">最低阈值</label>
                        <div class="flex items-center gap-2">
                            <input type="number" value="6" class="w-20 bg-[#374151] border border-[#f59e0b]/30 rounded-lg px-3 py-2 text-white text-center focus:outline-none focus:border-[#f59e0b]">
                            <span class="text-gray-400 text-sm">大于等于此值才匹配</span>
                        </div>
                    </div>
                </div>

                <!-- 滑块 -->
                <div class="mb-4">
                    <div class="flex justify-between text-xs text-gray-500 mb-1">
                        <span>4</span>
                        <span>10</span>
                    </div>
                    <input type="range" min="4" max="10" value="6" class="w-full">
                </div>

                <!-- 快速预设 -->
                <div class="flex items-center gap-2 mb-4">
                    <span class="text-sm text-gray-400">快速预设:</span>
                    <button class="px-3 py-1 bg-[#374151] hover:bg-[#4b5563] rounded text-sm transition-colors">极差</button>
                    <button class="px-3 py-1 bg-[#f59e0b]/20 hover:bg-[#f59e0b]/30 border border-[#f59e0b] rounded text-sm transition-colors">普通</button>
                    <button class="px-3 py-1 bg-[#8b5cf6]/20 hover:bg-[#8b5cf6]/30 border border-[#8b5cf6] rounded text-sm transition-colors">优秀</button>
                    <button class="px-3 py-1 bg-[#fbbf24]/20 hover:bg-[#fbbf24]/30 border border-[#fbbf24] rounded text-sm transition-colors">极品</button>
                </div>

                <button class="w-full py-2 bg-[#8b5cf6] hover:bg-[#7c3aed] rounded-lg font-medium transition-colors flex items-center justify-center gap-2">
                    <span>＋</span> 添加到规则
                </button>
            </div>

            <!-- 当前规则列表 -->
            <div class="bg-[#1a1a2e] rounded-lg p-4">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-sm text-gray-400">当前规则 (0条)</span>
                </div>
                <div class="text-center py-8 text-gray-500">
                    <p>暂无规则，请添加</p>
                </div>
            </div>
        </div>

        <!-- 组合特性配置 -->
        <div class="game-border game-border-inner bg-[#16213e] rounded-lg p-5 mb-6">
            <h2 class="text-lg font-bold text-[#f59e0b] mb-4 flex items-center gap-2">
                <span>✨</span> 组合特性配置
            </h2>

            <div class="grid grid-cols-1 gap-3">
                <!-- 破甲 -->
                <label class="flex items-center gap-4 bg-[#1a1a2e] p-3 rounded-lg cursor-pointer hover:bg-[#262f4d] transition-colors">
                    <input type="checkbox" checked class="w-5 h-5 accent-[#f59e0b]">
                    <span class="font-medium">破甲</span>
                    <span class="text-gray-400 text-sm">物理穿刺+6%</span>
                    <div class="ml-auto flex items-center gap-2">
                        <span class="text-sm text-gray-400">最低等级:</span>
                        <select class="bg-[#374151] border border-[#f59e0b]/30 rounded px-2 py-1 text-sm w-16 focus:outline-none focus:border-[#f59e0b]">
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                        </select>
                    </div>
                </label>

                <!-- 破魔 -->
                <label class="flex items-center gap-4 bg-[#1a1a2e] p-3 rounded-lg cursor-pointer hover:bg-[#262f4d] transition-colors">
                    <input type="checkbox" class="w-5 h-5 accent-[#f59e0b]">
                    <span class="font-medium">破魔</span>
                    <span class="text-gray-400 text-sm">魔法穿刺+6%</span>
                    <div class="ml-auto flex items-center gap-2">
                        <span class="text-sm text-gray-400">最低等级:</span>
                        <select class="bg-[#374151] border border-[#f59e0b]/30 rounded px-2 py-1 text-sm w-16 focus:outline-none focus:border-[#f59e0b]">
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                        </select>
                    </div>
                </label>

                <!-- 尖锐 -->
                <label class="flex items-center gap-4 bg-[#1a1a2e] p-3 rounded-lg cursor-pointer hover:bg-[#262f4d] transition-colors">
                    <input type="checkbox" class="w-5 h-5 accent-[#f59e0b]">
                    <span class="font-medium">尖锐</span>
                    <span class="text-gray-400 text-sm">暴击伤害增加20%</span>
                    <div class="ml-auto flex items-center gap-2">
                        <span class="text-sm text-gray-400">最低等级:</span>
                        <select class="bg-[#374151] border border-[#f59e0b]/30 rounded px-2 py-1 text-sm w-16 focus:outline-none focus:border-[#f59e0b]">
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                        </select>
                    </div>
                </label>

                <!-- 利刃 -->
                <label class="flex items-center gap-4 bg-[#1a1a2e] p-3 rounded-lg cursor-pointer hover:bg-[#262f4d] transition-colors">
                    <input type="checkbox" class="w-5 h-5 accent-[#f59e0b]">
                    <span class="font-medium">利刃</span>
                    <span class="text-gray-400 text-sm">近战物理攻击增加10%</span>
                    <div class="ml-auto flex items-center gap-2">
                        <span class="text-sm text-gray-400">最低等级:</span>
                        <select class="bg-[#374151] border border-[#f59e0b]/30 rounded px-2 py-1 text-sm w-16 focus:outline-none focus:border-[#f59e0b]">
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                        </select>
                    </div>
                </label>

                <!-- 斗志 -->
                <label class="flex items-center gap-4 bg-[#1a1a2e] p-3 rounded-lg cursor-pointer hover:bg-[#262f4d] transition-colors">
                    <input type="checkbox" class="w-5 h-5 accent-[#f59e0b]">
                    <span class="font-medium">斗志</span>
                    <span class="text-gray-400 text-sm">忽视物理防御20%</span>
                    <div class="ml-auto flex items-center gap-2">
                        <span class="text-sm text-gray-400">最低等级:</span>
                        <select class="bg-[#374151] border border-[#f59e0b]/30 rounded px-2 py-1 text-sm w-16 focus:outline-none focus:border-[#f59e0b]">
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                        </select>
                    </div>
                </label>

                <!-- 名弓 -->
                <label class="flex items-center gap-4 bg-[#1a1a2e] p-3 rounded-lg cursor-pointer hover:bg-[#262f4d] transition-colors">
                    <input type="checkbox" checked class="w-5 h-5 accent-[#f59e0b]">
                    <span class="font-medium">名弓</span>
                    <span class="text-gray-400 text-sm">远程物理攻击增加10%</span>
                    <div class="ml-auto flex items-center gap-2">
                        <span class="text-sm text-gray-400">最低等级:</span>
                        <select class="bg-[#374151] border border-[#f59e0b]/30 rounded px-2 py-1 text-sm w-16 focus:outline-none focus:border-[#f59e0b]">
                            <option selected>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                        </select>
                    </div>
                </label>

                <!-- 狂热 -->
                <label class="flex items-center gap-4 bg-[#1a1a2e] p-3 rounded-lg cursor-pointer hover:bg-[#262f4d] transition-colors">
                    <input type="checkbox" class="w-5 h-5 accent-[#f59e0b]">
                    <span class="font-medium">狂热</span>
                    <span class="text-gray-400 text-sm">普攻伤害+10%</span>
                    <div class="ml-auto flex items-center gap-2">
                        <span class="text-sm text-gray-400">最低等级:</span>
                        <select class="bg-[#374151] border border-[#f59e0b]/30 rounded px-2 py-1 text-sm w-16 focus:outline-none focus:border-[#f59e0b]">
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                        </select>
                    </div>
                </label>

                <!-- 洞察 -->
                <label class="flex items-center gap-4 bg-[#1a1a2e] p-3 rounded-lg cursor-pointer hover:bg-[#262f4d] transition-colors">
                    <input type="checkbox" class="w-5 h-5 accent-[#f59e0b]">
                    <span class="font-medium">洞察</span>
                    <span class="text-gray-400 text-sm">忽视魔法防御+20%</span>
                    <div class="ml-auto flex items-center gap-2">
                        <span class="text-sm text-gray-400">最低等级:</span>
                        <select class="bg-[#374151] border border-[#f59e0b]/30 rounded px-2 py-1 text-sm w-16 focus:outline-none focus:border-[#f59e0b]">
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                        </select>
                    </div>
                </label>

                <!-- 奥法 -->
                <label class="flex items-center gap-4 bg-[#1a1a2e] p-3 rounded-lg cursor-pointer hover:bg-[#262f4d] transition-colors">
                    <input type="checkbox" class="w-5 h-5 accent-[#f59e0b]">
                    <span class="font-medium">奥法</span>
                    <span class="text-gray-400 text-sm">魔法伤害增加8%</span>
                    <div class="ml-auto flex items-center gap-2">
                        <span class="text-sm text-gray-400">最低等级:</span>
                        <select class="bg-[#374151] border border-[#f59e0b]/30 rounded px-2 py-1 text-sm w-16 focus:outline-none focus:border-[#f59e0b]">
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                            <option>4</option>
                        </select>
                    </div>
                </label>
            </div>
        </div>

        <!-- 匹配配置 -->
        <div class="game-border game-border-inner bg-[#16213e] rounded-lg p-5 mb-6">
            <h2 class="text-lg font-bold text-[#f59e0b] mb-4 flex items-center gap-2">
                <span>🎯</span> 匹配配置
            </h2>
            <div class="flex items-center gap-4 bg-[#1a1a2e] p-4 rounded-lg">
                <span class="text-gray-300">无组合特性时，至少匹配</span>
                <select class="bg-[#374151] border border-[#f59e0b]/30 rounded px-3 py-2 w-20 text-center focus:outline-none focus:border-[#f59e0b]">
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                </select>
                <span class="text-gray-300">条属性才保留</span>
            </div>
        </div>

        <!-- 图片分析 -->
        <div class="game-border game-border-inner bg-[#16213e] rounded-lg p-5">
            <h2 class="text-lg font-bold text-[#f59e0b] mb-4 flex items-center gap-2">
                <span>📷</span> 图片分析
            </h2>

            <!-- 文件输入 -->
            <div class="flex items-center gap-4 bg-[#1a1a2e] p-4 rounded-lg mb-4">
                <input type="text" value="fumo_564.png" class="flex-1 bg-[#374151] border border-[#f59e0b]/30 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-[#f59e0b]" placeholder="输入文件名">
                <button class="px-4 py-2 bg-[#374151] hover:bg-[#4b5563] rounded-lg transition-colors">选择文件</button>
                <button class="px-6 py-2 bg-[#8b5cf6] hover:bg-[#7c3aed] rounded-lg font-medium transition-colors">分析</button>
            </div>

            <!-- 分析结果 -->
            <div class="bg-[#1a1a2e] rounded-lg p-4">
                <div class="flex items-center gap-3 mb-4 pb-4 border-b border-[#374151]">
                    <span class="text-2xl text-green-500">✅</span>
                    <div>
                        <span class="font-bold text-green-500">保留</span>
                        <span class="text-gray-400 ml-2">| 原因: 符合预设范围</span>
                    </div>
                </div>

                <!-- 识别到的属性 -->
                <div class="mb-4">
                    <p class="text-sm text-gray-400 mb-2">识别到的属性:</p>
                    <div class="space-y-2">
                        <div class="flex items-center justify-between bg-[#262f4d] p-2 rounded">
                            <span>命中 +12</span>
                            <span class="text-green-500 text-sm">✓ 匹配</span>
                        </div>
                        <div class="flex items-center justify-between bg-[#262f4d] p-2 rounded">
                            <span>灵巧 +4</span>
                            <span class="text-red-500 text-sm">✗ 不匹配，阈值需≥5</span>
                        </div>
                        <div class="flex items-center justify-between bg-[#262f4d] p-2 rounded">
                            <span>魔法攻击 +9</span>
                            <span class="text-green-500 text-sm">✓ 匹配</span>
                        </div>
                    </div>
                </div>

                <!-- 组合特性 -->
                <div class="mb-4">
                    <p class="text-sm text-gray-400 mb-2">组合特性:</p>
                    <div class="bg-[#262f4d] p-3 rounded border-l-4 border-[#f59e0b]">
                        <span class="text-[#f59e0b]">【组合特性】名弓1</span>
                        <span class="text-green-500 ml-2">等级≥1 ✓</span>
                    </div>
                </div>

                <!-- 匹配结果 -->
                <div class="bg-[#16213e] p-3 rounded border border-[#8b5cf6]/30">
                    <p class="text-[#8b5cf6]">
                        <span class="font-bold">匹配结果:</span>
                        组合特性符合 + 属性匹配2条 → 保留
                    </p>
                </div>
            </div>
        </div>

        <!-- 页脚 -->
        <div class="text-center text-gray-500 text-sm mt-6">
            RO 附魔分析系统 v1.0
        </div>
    </div>
</body>
</html>
